<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Từ Điển Anh Mini</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>📖 Từ Điển Anh Mini</h1>
      <p class="subtitle">Tra nghĩa, từ đồng nghĩa và cách phát âm</p>
    </header>

    <div class="search-box">
      <input
        type="text"
        id="wordInput"
        placeholder="Nhập một từ tiếng Anh..."
        autocomplete="off"
        spellcheck="false"
      />
      <button id="searchBtn">Tìm kiếm</button>
    </div>

    <div id="errorMsg" class="error-msg hidden"></div>
    <div id="loading" class="loading hidden">Đang tìm kiếm...</div>

    <div id="result" class="result hidden">
      <div class="word-header">
        <h2 id="wordTitle"></h2>
        <div class="phonetics" id="phonetics"></div>
      </div>

      <div id="meanings"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
