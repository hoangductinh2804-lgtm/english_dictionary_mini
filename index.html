<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Dictionary Mini</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>📚 English Dictionary</h1>
      <p class="subtitle">Search for English words and discover their meanings</p>
    </header>

    <!-- Search Section -->
    <div class="search-section">
      <input 
        type="text" 
        id="searchInput" 
        class="search-input" 
        placeholder="Enter a word..."
        autocomplete="off"
      >
      <button id="searchBtn" class="search-btn">🔍 Search</button>
    </div>

    <!-- Error Message -->
    <div id="error" class="error-message"></div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
    </div>

    <!-- Results Section -->
    <div id="result" class="result-section hidden">
      <!-- Word Header -->
      <div class="word-header">
        <div>
          <h2 id="wordTitle" class="word-title"></h2>
          <p id="wordPhonetic" class="word-phonetic"></p>
        </div>
        <button id="playSound" class="play-sound-btn">🔊</button>
      </div>

      <!-- Word Image -->
      <div id="wordImageSection" class="word-image-section hidden">
        <img id="wordImage" class="word-image" src="" alt="">
        <p id="wordImageCaption" class="word-image-caption"></p>
      </div>

      <!-- Part of Speech -->
      <div id="partsOfSpeech" class="parts-of-speech"></div>

      <!-- Synonyms -->
      <div id="synonymsSection" class="synonyms-section hidden">
        <h3>Synonyms</h3>
        <div id="synonymsList" class="synonyms-list"></div>
      </div>

      <!-- Antonyms -->
      <div id="antonymsSection" class="antonyms-section hidden">
        <h3>Antonyms</h3>
        <div id="antonymsList" class="antonyms-list"></div>
      </div>

      <!-- Source -->
      <div id="sourceSection" class="source-section hidden">
        <h3>Source</h3>
        <a id="sourceLink" href="#" target="_blank"></a>
      </div>
    </div>
  </div>

  <!-- Script -->
  <script src="scripts/app.js"></script>
</body>
</html>
